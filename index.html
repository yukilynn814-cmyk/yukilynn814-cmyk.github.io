<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🚀 Y老大 · 项目集</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:-apple-system,"PingFang SC","Helvetica Neue",system-ui,sans-serif;
    background:#03060b;color:#e6edf3;min-height:100vh;overflow-x:hidden;
  }
  #starfield{position:fixed;inset:0;z-index:0;display:block;cursor:pointer}
  .container{max-width:900px;margin:0 auto;padding:40px 24px;position:relative;z-index:1;pointer-events:none}
  .container *{pointer-events:auto}

  /* ===== Header ===== */
  header{text-align:center;padding:60px 0 48px;position:relative}
  header .avatar{
    width:80px;height:80px;border-radius:50%;
    background:linear-gradient(135deg,#58a6ff,#bc8cff);
    display:flex;align-items:center;justify-content:center;
    font-size:36px;margin:0 auto 20px;
    box-shadow:0 0 40px rgba(88,166,255,0.15),0 4px 30px rgba(88,166,255,0.2);
    animation:glow 3s ease-in-out infinite;
  }
  @keyframes glow{0%,100%{box-shadow:0 0 40px rgba(88,166,255,0.15),0 4px 30px rgba(88,166,255,0.2)}50%{box-shadow:0 0 60px rgba(88,166,255,0.25),0 4px 30px rgba(88,166,255,0.3)}}
  header h1{font-size:2rem;font-weight:700;margin-bottom:8px}
  header h1 span{background:linear-gradient(135deg,#58a6ff,#bc8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
  header p{color:rgba(255,255,255,0.3);font-size:0.9rem;max-width:500px;margin:0 auto;line-height:1.7}

  /* ===== Projects Section ===== */
  .section{margin-bottom:40px}
  .section-title{
    font-size:0.72rem;text-transform:uppercase;letter-spacing:4px;
    color:rgba(255,255,255,0.18);margin-bottom:16px;padding-bottom:10px;
    border-bottom:1px solid rgba(255,255,255,0.04);
    display:flex;align-items:center;gap:8px;
  }
  .section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,255,255,0.06),transparent)}
  .project-card{
    display:flex;align-items:center;gap:20px;
    background:rgba(255,255,255,0.02);
    border:1px solid rgba(255,255,255,0.05);
    border-radius:14px;padding:20px 24px;margin-bottom:14px;
    transition:all 0.3s cubic-bezier(0.4,0,0.2,1);
    cursor:pointer;text-decoration:none;color:inherit;
    position:relative;overflow:hidden;
    backdrop-filter:blur(2px);
  }
  .project-card::before{
    content:'';position:absolute;inset:0;opacity:0;
    background:linear-gradient(135deg,var(--card-accent,transparent),transparent 60%);
    transition:opacity 0.4s;border-radius:14px;
  }
  .project-card::after{
    content:'';position:absolute;inset:-1px;border-radius:14px;
    border:1px solid transparent;
    background:linear-gradient(135deg,var(--card-accent,transparent),transparent 60%)border-box;
    -webkit-mask:linear-gradient(#fff 0 0)padding-box,linear-gradient(#fff 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude;
    opacity:0;transition:opacity 0.4s;
  }
  .project-card:hover{transform:translateY(-3px);background:rgba(255,255,255,0.04);border-color:transparent}
  .project-card:hover::before{opacity:0.08}
  .project-card:hover::after{opacity:1}
  .project-card .icon{
    width:52px;height:52px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:24px;
    position:relative;z-index:1;
    background:var(--card-icon-bg,rgba(255,255,255,0.05));
  }
  .project-card .info{flex:1;position:relative;z-index:1;min-width:0}
  .project-card .info h3{font-size:1.02rem;font-weight:600;margin-bottom:5px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
  .project-card .info .desc{font-size:0.84rem;color:rgba(255,255,255,0.4);line-height:1.55;margin-bottom:10px}
  .project-card .info .tags{display:flex;gap:6px;flex-wrap:wrap}
  .project-card .info .tags span{font-size:0.68rem;padding:2px 10px;border-radius:20px;background:rgba(255,255,255,0.04);color:rgba(255,255,255,0.35);border:1px solid rgba(255,255,255,0.05)}
  .project-card .arrow{font-size:18px;color:rgba(255,255,255,0.1);flex-shrink:0;transition:transform 0.3s,color 0.3s;position:relative;z-index:1}
  .project-card:hover .arrow{transform:translateX(6px);color:var(--card-accent,rgba(255,255,255,0.4))}
  .status-badge{display:inline-flex;align-items:center;gap:4px;font-size:0.68rem;padding:2px 10px;border-radius:20px}
  .status-badge.online{background:rgba(63,185,80,0.08);color:#3fb950;border:1px solid rgba(63,185,80,0.15)}
  .status-badge.wip{background:rgba(248,81,73,0.08);color:#f85149;border:1px solid rgba(248,81,73,0.15)}

  footer{text-align:center;padding:40px 0 60px;color:rgba(255,255,255,0.06);font-size:0.75rem;letter-spacing:1px}

  /* ===== Message Board Modal ===== */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,0.65);
    backdrop-filter:blur(6px);z-index:1000;
    display:none;align-items:center;justify-content:center;
    animation:fadeIn 0.25s ease;padding:20px;
  }
  .modal-overlay.show{display:flex}
  @keyframes fadeIn{0%{opacity:0}100%{opacity:1}}
  @keyframes slideUp{0%{transform:translateY(30px);opacity:0}100%{transform:translateY(0);opacity:1}}

  .modal-box{
    background:#0d1117;border:1px solid rgba(255,255,255,0.08);
    border-radius:18px;width:100%;max-width:480px;max-height:80vh;
    display:flex;flex-direction:column;overflow:hidden;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
    animation:slideUp 0.3s ease;
  }
  .modal-header{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid rgba(255,255,255,0.06);
  }
  .modal-header h3{font-size:0.95rem;font-weight:600;display:flex;align-items:center;gap:8px}
  .modal-header .close-btn{
    width:32px;height:32px;border-radius:50%;border:none;
    background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.4);
    cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;
    transition:all 0.2s;font-family:inherit;
  }
  .modal-header .close-btn:hover{background:rgba(255,255,255,0.12);color:#fff}

  .modal-body{flex:1;overflow-y:auto;padding:16px 20px}
  .modal-body::-webkit-scrollbar{width:4px}
  .modal-body::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.08);border-radius:4px}

  /* ===== Messages ===== */
  .msg-list{display:flex;flex-direction:column;gap:14px}
  .msg-item{
    display:flex;gap:10px;animation:fadeIn 0.3s ease;
    position:relative;
  }
  .msg-item .avatar{
    width:36px;height:36px;border-radius:50%;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;
    font-size:14px;font-weight:600;margin-top:2px;
  }
  .msg-item .body{flex:1;min-width:0}
  .msg-item .body .meta{display:flex;align-items:center;gap:6px;margin-bottom:3px}
  .msg-item .body .meta .name{font-size:0.78rem;font-weight:600;color:rgba(255,255,255,0.6)}
  .msg-item .body .meta .time{font-size:0.65rem;color:rgba(255,255,255,0.2)}
  .msg-item .body .text{
    font-size:0.88rem;line-height:1.55;color:#e6edf3;
    background:rgba(255,255,255,0.04);border-radius:4px 12px 12px 12px;
    padding:8px 12px;word-break:break-word;
  }
  .msg-item .body .text.admin-badge{
    border-left:2px solid #58a6ff;
  }
  .msg-item .body .actions{
    display:none;gap:6px;margin-top:4px;padding-left:4px;
  }
  .msg-item:hover .body .actions{display:flex}
  .msg-item .body .actions button{
    background:none;border:none;color:rgba(255,255,255,0.25);
    font-size:0.68rem;cursor:pointer;padding:2px 6px;
    border-radius:4px;font-family:inherit;
  }
  .msg-item .body .actions button:hover{background:rgba(255,255,255,0.06);color:#58a6ff}
  .msg-item .body .actions .del:hover{color:#f85149}

  .empty-msg{padding:40px 20px;text-align:center;color:rgba(255,255,255,0.15);font-size:0.85rem;line-height:1.7}

  /* ===== Post Form ===== */
  .modal-footer{
    padding:14px 20px 18px;border-top:1px solid rgba(255,255,255,0.06);
  }
  .post-form{display:flex;gap:8px}
  .post-form input[type="text"]{
    flex:1;padding:10px 14px;border-radius:20px;
    background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);
    color:#e6edf3;font-size:0.85rem;font-family:inherit;
    outline:none;transition:border-color 0.2s;
  }
  .post-form input:focus{border-color:#58a6ff}
  .post-form button{
    width:40px;height:40px;border-radius:50%;border:none;
    background:linear-gradient(135deg,#58a6ff,#bc8cff);
    color:#fff;cursor:pointer;font-size:18px;
    display:flex;align-items:center;justify-content:center;
    transition:transform 0.15s;flex-shrink:0;
  }
  .post-form button:hover{transform:scale(1.05)}
  .post-form button:active{transform:scale(0.95)}
  .post-form button:disabled{opacity:0.3;cursor:default;transform:none}

  .post-name-row{display:flex;gap:8px;margin-bottom:8px}
  .post-name-row input{flex:1;padding:8px 12px;border-radius:20px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:#e6edf3;font-size:0.8rem;font-family:inherit;outline:none}
  .post-name-row input:focus{border-color:#58a6ff}
  .post-name-row .admin-badge-input{
    font-size:0.68rem;color:rgba(255,255,255,0.2);display:flex;align-items:center;gap:4px;cursor:pointer;flex-shrink:0;
  }
  .post-name-row .admin-badge-input:hover{color:rgba(255,255,255,0.4)}

  /* ===== Edit mode ===== */
  .edit-input{
    width:100%;padding:8px 10px;border-radius:8px;
    background:rgba(88,166,255,0.08);border:1px solid #58a6ff;
    color:#e6edf3;font-size:0.88rem;font-family:inherit;
    outline:none;margin-bottom:4px;
  }
  .edit-actions{display:flex;gap:6px}
  .edit-actions button{
    background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);
    color:rgba(255,255,255,0.6);padding:2px 12px;border-radius:8px;
    cursor:pointer;font-size:0.7rem;font-family:inherit;
  }
  .edit-actions button:hover{background:rgba(255,255,255,0.12)}

  /* ===== Hover Preview ===== */
  .hover-preview{
    position:fixed;z-index:500;pointer-events:none;
    background:rgba(13,17,23,0.95);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:12px;padding:12px 16px;max-width:280px;
    backdrop-filter:blur(12px);
    animation:fadeIn 0.3s ease;display:none;
    box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .hover-preview.show{display:block}
  .hover-preview .hp-title{
    font-size:0.72rem;color:rgba(255,255,255,0.3);margin-bottom:8px;
    display:flex;align-items:center;gap:6px;
  }
  .hover-preview .hp-msg{
    font-size:0.78rem;color:rgba(255,255,255,0.6);
    padding:4px 0;line-height:1.4;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .hover-preview .hp-more{
    font-size:0.7rem;color:rgba(88,166,255,0.4);margin-top:6px;
  }

  @media(max-width:600px){
    .container{padding:20px 16px}
    header{padding:40px 0 32px}
    header h1{font-size:1.5rem}
    .project-card{padding:16px;gap:14px}
    .project-card .icon{width:44px;height:44px;font-size:20px}
    .project-card .info h3{font-size:0.92rem}
    .project-card .info .desc{font-size:0.8rem}
    .modal-box{max-height:90vh;border-radius:14px}
    .hover-preview{max-width:220px}
  }
</style>
</head>
<body>
<canvas id="starfield"></canvas>

<div class="container">
  <header>
    <div class="avatar">🚀</div>
    <h1><span>Y老大</span> 的项目</h1>
    <p>钢铁侠负责拍脑袋，小虾虾负责落地。<br>
      点击左下角的 🌍 地球，留下你的话 ✨</p>
  </header>

  <div class="section" id="projectsSection">
    <div class="section-title">✦ 项目列表 <span id="adminProjectControls" style="display:none;margin-left:8px">
      <button onclick="showAddProject()" style="background:none;border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.4);padding:2px 10px;border-radius:6px;cursor:pointer;font-size:0.65rem;font-family:inherit">+ 添加项目</button>
    </span></div>
    <div id="projectList"></div>
  </div>
  <footer>🦐 小虾虾 · Stark Industries 出品</footer>
</div>

<!-- Hover Preview -->
<div class="hover-preview" id="hoverPreview">
  <div class="hp-title">💬 留言星 · 最新</div>
  <div id="hpMsgs"></div>
  <div class="hp-more">点击地球查看全部 →</div>
</div>

<!-- Message Board Modal -->
<div class="modal-overlay" id="msgModal">
  <div class="modal-box">
    <div class="modal-header">
      <h3>💬 留言星 🌍 <span id="adminBadge" style="font-size:0.65rem;color:rgba(255,255,255,0.2);margin-left:4px"></span></h3>
      <div style="display:flex;gap:6px;align-items:center">
        <button class="close-btn" id="adminKeyBtn" onclick="toggleAdminMode()" title="管理员" style="font-size:14px">🔑</button>
        <button class="close-btn" onclick="closeMsgModal()">✕</button>
      </div>
    </div>
    <div class="modal-body" id="msgBody">
      <div class="empty-msg">🌌 还没有留言…<br>写下第一句话吧</div>
    </div>
    <div class="modal-footer">
      <div class="post-name-row">
        <input type="text" id="postName" placeholder="你的名字" maxlength="12">
      </div>
      <div class="post-form">
        <input type="text" id="postInput" placeholder="说点什么…" maxlength="200" onkeydown="if(event.key==='Enter')postMessage()">
        <button id="postBtn" onclick="postMessage()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
// ============================================================
// 🌌 深空星域引擎 v3
// ============================================================
const canvas=document.getElementById("starfield");
const ctx=canvas.getContext("2d");
let W,H,stars=[],shootingStars=[],particles=[];
let planets=[],pendingReplacements=[];
const STAR_COUNT=150;

function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
window.addEventListener("resize",resize); resize();
function dist(x1,y1,x2,y2){return Math.hypot(x2-x1,y2-y1)}
function rnd(a,b){return a+Math.random()*(b-a)}

// ===== Celestial Body =====
class Celestial{
  constructor(cx,cy,r,name,color,hasRing,moons){
    this.cx=cx;this.cy=cy;this.r=r;this.name=name;this.baseColor=color;
    this.hasRing=hasRing;this.rot=0;this.rotSpeed=rnd(0.0005,0.002);
    this.moons=moons||[];this.pulse=0;this.isEarth=name==="Earth";
  }
  draw(){
    this.rot+=this.rotSpeed;this.pulse+=0.005;
    const cx=this.cx,cy=this.cy,r=this.r;
    // Glow
    const grd=ctx.createRadialGradient(cx,cy,r,cx,cy,r*3);
    grd.addColorStop(0,`rgba(${this.baseColor},0.06)`);
    grd.addColorStop(1,`rgba(${this.baseColor},0)`);
    ctx.fillStyle=grd; ctx.beginPath();ctx.arc(cx,cy,r*3,0,Math.PI*2);ctx.fill();

    if(this.hasRing){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(this.rot*0.5);
      ctx.beginPath();ctx.ellipse(0,0,r*1.8,r*0.4,0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(200,190,170,${0.08+0.03*Math.sin(this.pulse)})`;
      ctx.lineWidth=1.5;ctx.stroke();
      ctx.restore();
    }
    // Earth mobile touch ring
    if(this.isEarth){
      const pulseRing=0.5+0.5*Math.sin(this.pulse*3);
      ctx.beginPath();ctx.arc(cx,cy,r+15+pulseRing*8,0,Math.PI*2);
      ctx.strokeStyle=`rgba(80,200,255,${0.04+0.04*pulseRing})`;
      ctx.lineWidth=1.5;ctx.setLineDash([4,8]);ctx.stroke();ctx.setLineDash([]);
    }
    // Earth special - atmosphere glow when hovered
    if(this.isEarth && this.hoverPulse){
      const atmo=ctx.createRadialGradient(cx,cy,r*0.8,cx,cy,r*1.3);
      atmo.addColorStop(0,`rgba(80,180,255,${0.04+0.03*Math.sin(this.pulse*2)})`);
      atmo.addColorStop(1,"rgba(80,180,255,0)");
      ctx.fillStyle=atmo; ctx.beginPath();ctx.arc(cx,cy,r*1.3,0,Math.PI*2);ctx.fill();
    }
    // Body
    const bGrd=ctx.createRadialGradient(cx-r*0.3,cy-r*0.3,r*0.1,cx,cy,r);
    bGrd.addColorStop(0,`rgba(${this.baseColor},1)`);
    bGrd.addColorStop(0.5,`rgba(${this.baseColor},0.8)`);
    bGrd.addColorStop(1,`rgba(${this.baseColor},0.4)`);
    ctx.fillStyle=bGrd;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    // Continents for Earth
    if(this.isEarth){
      ctx.save();ctx.translate(cx,cy);ctx.rotate(this.rot*0.2);
      [
        {x:-15,y:-10,rx:16,ry:12,c:"rgba(60,180,90,0.5)"},
        {x:12,y:-14,rx:14,ry:18,c:"rgba(70,190,100,0.4)"},
        {x:-22,y:14,rx:12,ry:10,c:"rgba(60,175,85,0.45)"},
        {x:18,y:12,rx:13,ry:11,c:"rgba(65,185,95,0.4)"},
        {x:-4,y:-30,rx:10,ry:8,c:"rgba(75,195,105,0.35)"},
      ].forEach(c=>{ctx.beginPath();ctx.ellipse(c.x,c.y,c.rx,c.ry,0,0,Math.PI*2);
        ctx.fillStyle=c.c;ctx.fill()});
      ctx.restore();
    }
    // Highlight
    const hl=ctx.createRadialGradient(cx-r*0.2,cy-r*0.2,0,cx,cy,r);
    hl.addColorStop(0,"rgba(255,255,255,0.1)");
    hl.addColorStop(1,"rgba(0,0,0,0.15)");
    ctx.fillStyle=hl;ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    // Moons
    this.moons.forEach(m=>{
      m.angle+=m.speed;
      const mx=cx+Math.cos(m.angle)*m.dist,my=cy+Math.sin(m.angle)*m.dist;
      ctx.beginPath();ctx.arc(mx,my,m.size,0,Math.PI*2);
      ctx.fillStyle="rgba(200,200,210,0.3)";ctx.fill();
    });
  }
  contains(px,py){return dist(px,py,this.cx,this.cy)<this.r+10}
}

// ===== Nebula =====
class Nebula{constructor(cx,cy,rx,ry,cols){this.cx=cx;this.cy=cy;this.rx=rx;this.ry=ry;this.cols=cols;this.rot=0}
  draw(){this.rot+=0.0002;ctx.save();ctx.translate(this.cx,this.cy);ctx.rotate(this.rot);
    this.cols.forEach(c=>{const x=rnd(-this.rx*0.5,this.rx*0.5),y=rnd(-this.ry*0.5,this.ry*0.5),size=rnd(this.rx*0.2,this.rx*0.4);
      const grd=ctx.createRadialGradient(x,y,0,x,y,size);
      grd.addColorStop(0,c);grd.addColorStop(1,"rgba(0,0,0,0)");
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(x,y,size,0,Math.PI*2);ctx.fill()});
    ctx.restore()}
}

// ===== Star =====
const STYPES=["circle","spark","diamond","cluster","cross"];
const CROSS_STAR_COUNT=6;
class Star{
  constructor(x,y){
    this.x=x!==undefined?x:rnd(0,W);this.y=y!==undefined?y:rnd(0,H);
    this.homeX=this.x;this.homeY=this.y;
    this.baseSize=rnd(2.5,6.5);this.size=this.baseSize;
    this.alpha=rnd(0.3,0.8);this.twinkleSpeed=rnd(0.008,0.03);
    this.twinklePhase=rnd(0,Math.PI*2);
    this.type=this.special?"cross":STYPES[Math.floor(rnd(0,STYPES.length-1))];
    this.special=this.special||false;
    this.redTrail=false;
    this.falling=false;this.fallSpeed=0;this.fallAngle=rnd(-0.3,0.3);
    this.fA=rnd(0,Math.PI*2);this.fS=rnd(0.0005,0.002);this.fR=rnd(0.5,2.5);
    const t=Math.random();this.tint=t<0.12?[255,200,180]:t<0.25?[180,210,255]:t<0.35?[255,225,160]:[255,255,255];
    this.cluster=this.type==="cluster"?Array.from({length:2+Math.floor(rnd(0,3))},()=>({dx:rnd(-5,5),dy:rnd(-5,5),s:rnd(0.5,1.8)})):null;
  }
  update(){
    this.twinklePhase+=this.twinkleSpeed;this.fA+=this.fS;
    this.x=this.homeX+Math.sin(this.fA)*this.fR;this.y=this.homeY+Math.cos(this.fA*0.7)*this.fR*0.5;
    if(this.falling){this.fallSpeed+=0.1;this.x+=Math.sin(this.fallAngle)*this.fallSpeed*0.2;this.y+=this.fallSpeed;this.alpha-=0.008;this.size*=0.998;
      if(this.alpha<=0||this.y>H+60){this.falling=false;scheduleReplacement(this);return false}}
    return true
  }
  draw(){if(this.alpha<=0)return;const tw=0.6+0.4*Math.sin(this.twinklePhase),a=Math.min(this.alpha*tw,1),[r,g,b]=this.tint;
    if(this.type==="circle")this._c(a,r,g,b);else if(this.type==="spark")this._s(a,r,g,b);else if(this.type==="diamond")this._d(a,r,g,b);else if(this.type==="cluster"&&this.cluster)this._cl(a,r,g,b);else if(this.type==="cross")this._cr(a,r,g,b)}
  _c(a,r,g,b){ctx.beginPath();ctx.arc(this.x,this.y,this.size*0.5,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a*0.9})`;ctx.fill()
    if(this.size>1.8){ctx.beginPath();ctx.arc(this.x,this.y,this.size*1.4,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${a*0.06})`;ctx.fill()}}
  _s(a,r,g,b){const s=this.size*0.65;ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.twinklePhase*0.15);ctx.beginPath();
    for(let i=0;i<4;i++){const ang=i/4*Math.PI*2-Math.PI/4,l=i%2===0?s:s*0.3;ctx.lineTo(Math.cos(ang)*l,Math.sin(ang)*l)}
    ctx.closePath();ctx.fillStyle=`rgba(${r},${g},${b},${a*0.65})`;ctx.fill()
    ctx.beginPath();ctx.arc(0,0,this.size*0.2,0,Math.PI*2);ctx.fillStyle=`rgba(${Math.min(r+40,255)},${Math.min(g+40,255)},${Math.min(b+40,255)},${a})`;ctx.fill();ctx.restore()}
  _d(a,r,g,b){const s=this.size*0.55;ctx.save();ctx.translate(this.x,this.y);ctx.rotate(Math.PI/4+this.twinklePhase*0.08);
    ctx.fillStyle=`rgba(${r},${g},${b},${a*0.5})`;ctx.fillRect(-s/2,-s/2,s,s)
    ctx.fillStyle=`rgba(${Math.min(r+50,255)},${Math.min(g+50,255)},${Math.min(b+50,255)},${a*0.25})`;ctx.fillRect(-s/4,-s/4,s/2,s/2);ctx.restore()}
  _cl(a,r,g,b){this.cluster.forEach((c,i)=>{const ca=a*(0.5+0.5*(1-i/this.cluster.length));
    ctx.beginPath();ctx.arc(this.x+c.dx,this.y+c.dy,c.s,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${ca*0.8})`;ctx.fill()
    ctx.beginPath();ctx.arc(this.x+c.dx,this.y+c.dy,c.s*2,0,Math.PI*2);ctx.fillStyle=`rgba(${r},${g},${b},${ca*0.03})`;ctx.fill()})}
  _cr(a,r,g,b){const s=this.size*0.9;ctx.save();ctx.translate(this.x,this.y);ctx.rotate(this.twinklePhase*0.12);
    // Glow backdrop
    const g=ctx.createRadialGradient(0,0,0,0,0,s*1.8);
    g.addColorStop(0,`rgba(255,200,120,${a*0.08})`);g.addColorStop(1,`rgba(255,200,120,0)`);
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(0,0,s*1.8,0,Math.PI*2);ctx.fill();
    // Cross arms
    for(let i=0;i<4;i++){const ang=i/4*Math.PI*2;ctx.beginPath();ctx.moveTo(0,0);
      ctx.lineTo(Math.cos(ang)*s,Math.sin(ang)*s);ctx.lineTo(Math.cos(ang+0.12)*s*0.3,Math.sin(ang+0.12)*s*0.3);ctx.closePath();
      ctx.fillStyle=`rgba(${255-20*i},${200-30*i},${120+30*i},${a*0.85})`;ctx.fill()}
    // Core
    ctx.beginPath();ctx.arc(0,0,this.size*0.2,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${a})`;ctx.fill();ctx.restore()}
  contains(px,py){return dist(px,py,this.x,this.y)<Math.max(this.size*2,16)}
}

// ===== Shooting Star =====
class SS{constructor(tx,ty){this.sx=W+80;this.sy=-30;this.tx=tx;this.ty=ty;this.prog=0;this.speed=rnd(0.015,0.025);this.trail=[];this.alive=true}
  update(){if(!this.alive)return false;this.prog+=this.speed;this.trail.push({x:this.getX(),y:this.getY(),a:1});
    if(this.trail.length>35)this.trail.shift();this.trail.forEach(t=>t.a-=0.035);if(this.prog>=1){this.alive=false;return false}return true}
  getX(){return this.sx+(this.tx-this.sx)*this.prog}
  getY(){return this.sy+(this.ty-this.sy)*this.prog-45*Math.sin(this.prog*Math.PI)}
  draw(){this.trail.forEach((t,i)=>{if(t.a<=0)return;ctx.beginPath();ctx.arc(t.x,t.y,1.5*(i/this.trail.length),0,Math.PI*2);
    const tc=this.isRed?`rgba(255,80,50,${t.a*0.35})`:`rgba(255,240,210,${t.a*0.25})`;
    ctx.fillStyle=tc;ctx.fill()});
    const x=this.getX(),y=this.getY();
    const hc=this.isRed?"rgba(255,120,80,0.95)":"rgba(255,255,255,0.85)";
    const gc=this.isRed?"rgba(255,100,60,0.25)":"rgba(200,220,255,0.15)";
    ctx.beginPath();ctx.arc(x,y,this.isRed?4:3,0,Math.PI*2);ctx.fillStyle=hc;ctx.fill()
    ctx.beginPath();ctx.arc(x,y,this.isRed?15:10,0,Math.PI*2);ctx.fillStyle=gc;ctx.fill()}
}

function scheduleReplacement(o){pendingReplacements.push({x:o?o.homeX:rnd(0,W),y:o?o.homeY:rnd(0,H),cd:15+Math.floor(rnd(0,25)),extra:(o&&o.special)?{isRed:true}:{}})}
function spawnBurst(x,y,c){for(let i=0;i<12;i++)particles.push({x,y,color:c,vx:rnd(-4,4),vy:rnd(1,5),life:15+rnd(0,10),age:0})}

// ===== Click/Touch Handler =====
function handleCanvasTap(px,py){
  // Larger hit area for Earth on mobile
  for(const p of planets){
    const hitR=p.isEarth?Math.max(p.r+25,80):p.r+10;
    if(dist(px,py,p.cx,p.cy)<hitR){
      if(p.isEarth){openMsgModal();return}
      spawnBurst(p.cx,p.cy,p.baseColor);return
    }
  }
  let best=null,bestD=60;
  for(const s of stars){if(s.falling)continue;const d=dist(px,py,s.x,s.y);if(d<bestD){bestD=d;best=s}}
  if(best){best.startFall();spawnBurst(best.x,best.y,"255,255,255")}
}
canvas.addEventListener("click",e=>{
  const rect=canvas.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top;
  handleCanvasTap(px,py);
});
canvas.addEventListener("touchstart",e=>{
  e.preventDefault();
  const touch=e.touches[0];
  if(!touch)return;
  const rect=canvas.getBoundingClientRect(),px=touch.clientX-rect.left,py=touch.clientY-rect.top;
  // Vibrate on Earth touch for feedback
  const earth=planets[0];
  if(earth&&dist(px,py,earth.cx,earth.cy)<earth.r+30){
    if(navigator.vibrate)navigator.vibrate(10);
  }
  handleCanvasTap(px,py);
},{passive:false});

// ===== Earth Hover =====
let hoverTimer=null;
canvas.addEventListener("mousemove",e=>{
  const rect=canvas.getBoundingClientRect(),px=e.clientX-rect.left,py=e.clientY-rect.top;
  const earth=planets[0];
  if(earth&&earth.contains(px,py)){
    canvas.style.cursor="pointer";
    if(!hoverTimer){
      hoverTimer=setTimeout(()=>{showHoverPreview(e.clientX,e.clientY);hoverTimer=null},2000);
    }
    earth.hoverPulse=true;
  }else{
    canvas.style.cursor="default";
    if(hoverTimer){clearTimeout(hoverTimer);hoverTimer=null}
    hideHoverPreview();
    if(earth)earth.hoverPulse=false;
  }
});
canvas.addEventListener("mouseleave",()=>{
  if(hoverTimer){clearTimeout(hoverTimer);hoverTimer=null}
  hideHoverPreview();if(planets[0])planets[0].hoverPulse=false;
});

const API_URL="https://api.github.com/repos/yukilynn814-cmyk/yukilynn814-cmyk.github.io/contents/data/messages.json";
const RAW_URL="https://raw.githubusercontent.com/yukilynn814-cmyk/yukilynn814-cmyk.github.io/main/data/messages.json";
let TOKEN=localStorage.getItem("sf_gh_token")||"";
let msgData=[];
let isAdmin=false;
let adminToken=""; // Y老大填管理员暗号
let editingId=null;

function getMessages(){
  try{return JSON.parse(localStorage.getItem("sf_msgCache"))||[]}catch(e){return []}
}
function setMessages(msgs){localStorage.setItem("sf_msgCache",JSON.stringify(msgs))}

// Load messages
async function loadMessages(){
  try{
    const r=await fetch(RAW_URL);
    if(!r.ok)throw new Error("fetch failed");
    const raw=await r.text();
    msgData=JSON.parse(raw);
    if(!Array.isArray(msgData))msgData=[];
    setMessages(msgData);
  }catch(e){
    msgData=getMessages();
  }
  renderMessages();
}

// Save messages via GitHub API
async function saveMessages(){
  if(!TOKEN){
    const t=prompt("🔑 需要 GitHub Token 才能保存留言到云端：");
    if(!t)return false;
    TOKEN=t.trim();
    localStorage.setItem("sf_gh_token",TOKEN);
  }
  try{
    const content=btoa(unescape(encodeURIComponent(JSON.stringify(msgData,null,2))));
    // Get current SHA
    const getR=await fetch(API_URL,{headers:{Authorization:"token "+TOKEN,"Accept":"application/vnd.github.v3+json"}});
    const getD=await getR.json();
    const sha=getD.sha||"";
    const r=await fetch(API_URL,{
      method:"PUT",
      headers:{"Authorization":"token "+TOKEN,"Content-Type":"application/json"},
      body:JSON.stringify({message:"💬 更新留言",content,sha})
    });
    if(!r.ok)throw new Error("save failed");
    setMessages(msgData);
    return true;
  }catch(e){
    // Fallback: save to localStorage only
    setMessages(msgData);
    return false;
  }
}

// Render messages
function renderMessages(){
  const body=document.getElementById("msgBody");
  if(msgData.length===0){
    body.innerHTML='<div class="empty-msg">🌌 还没有留言…<br>写下第一句话吧</div>';
    return;
  }
  body.innerHTML=`<div class="msg-list">${msgData.map((m,i)=>renderMsg(m,i)).join("")}</div>`;
  body.scrollTop=body.scrollHeight;
}
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}
function timeAgo(ts){
  const d=Date.now()-ts;
  if(d<60000)return"刚刚";
  if(d<3600000)return Math.floor(d/60000)+"分钟前";
  if(d<86400000)return Math.floor(d/3600000)+"小时前";
  return Math.floor(d/86400000)+"天前";
}

function renderMsg(m,i){
  const isOwn=m.id===editingId;
  const nameCls=m.nameClass||["#58a6ff","#bc8cff","#f0883e","#3fb950","#f85149","#f0a0c0"][Math.abs(hashStr(m.name||""))%6];
  const canEdit=isAdmin||(localStorage.getItem("sf_userId")===m.userId);
  const isAdminMsg=m.isAdmin;

  if(isOwn){
    return `<div class="msg-item">
      <div class="avatar" style="background:${nameCls};color:#fff">${(m.name||"?")[0]}</div>
      <div class="body">
        <div class="meta"><span class="name">${esc(m.name)}</span><span class="time">${timeAgo(m.ts)}</span></div>
        <input class="edit-input" id="editInput" value="${esc(m.text)}" maxlength="200">
        <div class="edit-actions">
          <button onclick="saveEdit('${m.id}')">💾 保存</button>
          <button onclick="cancelEdit()">取消</button>
        </div>
      </div>
    </div>`;
  }

  return `<div class="msg-item">
    <div class="avatar" style="background:${nameCls};color:#fff">${(m.name||"?")[0]}</div>
    <div class="body">
      <div class="meta">
        <span class="name">${esc(m.name)}${isAdminMsg?' <span style="color:#58a6ff;font-size:0.65rem">✦</span>':''}</span>
        <span class="time">${timeAgo(m.ts)}</span>
      </div>
      <div class="text${isAdminMsg?' admin-badge':''}">${esc(m.text)}</div>
      <div class="actions">
        ${canEdit?`<button onclick="startEdit('${m.id}')">✏️ 编辑</button>`:''}
        ${canEdit?`<button class="del" onclick="deleteMsg('${m.id}')">🗑️ 删除</button>`:''}
      </div>
    </div>
  </div>`;
}

function hashStr(s){let h=0;for(let i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0}return h}

// Post message
async function postMessage(){
  const name=document.getElementById("postName").value.trim()||"匿名";
  const text=document.getElementById("postInput").value.trim();
  if(!text)return;
  let userId=localStorage.getItem("sf_userId");
  if(!userId){userId="u_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);localStorage.setItem("sf_userId",userId);}

  msgData.push({
    id:"m_"+Date.now()+"_"+Math.random().toString(36).slice(2,6),
    name,
    text,
    ts:Date.now(),
    userId,
    isAdmin:isAdmin
  });
  document.getElementById("postInput").value="";
  renderMessages();
  const ok=await saveMessages();
  if(!ok)renderMessages(); // re-render with cache status
}

  msgData=msgData.filter(m=>m.id!==id);
  await saveMessages();
  renderMessages();
}

// ===== Render Loop =====
function render(){
  ctx.fillStyle="rgba(3,6,11,0.25)";ctx.fillRect(0,0,W,H);
  nebulae.forEach(n=>n.draw());

  for(let i=pendingReplacements.length-1;i>=0;i--){
    const p=pendingReplacements[i];p.cd--;
    if(p.cd<=0){shootingStars.push(new SS(p.x,p.y,p.extra&&p.extra.isRed));pendingReplacements.splice(i,1)}
  }

  // Asteroids
  for(let i=0;i<30;i++){
    const a=performance.now()*0.0001+i*0.21,d=90+rnd(0,120);
    const x=planets[0].cx+Math.cos(a)*d,y=planets[0].cy+Math.sin(a)*d*0.35,s=rnd(1.5,3);
    ctx.beginPath();ctx.arc(x,y,s,0,Math.PI*2);ctx.fillStyle=`rgba(160,155,145,${rnd(0.12,0.25)})`;ctx.fill();
  }

  planets.forEach(p=>p.draw());

  for(let i=shootingStars.length-1;i>=0;i--){
    const ss=shootingStars[i];
    if(ss.alive){ss.update();ss.draw()}
    if(!ss.alive){const ns=new Star(ss.tx,ss.ty);if(ss.isRed){ns.type="cross";ns.special=true;ns.baseSize=rnd(4,7);ns.size=ns.baseSize;ns.tint=[255,200,120]};stars.push(ns);shootingStars.splice(i,1)}
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.age++;
    if(p.age>=p.life){particles.splice(i,1);continue}
    const a=0.7*(1-p.age/p.life);
    ctx.beginPath();ctx.arc(p.x,p.y,1.8*(1-p.age/p.life),0,Math.PI*2);
    ctx.fillStyle=`rgba(${p.color},${a})`;ctx.fill();
  }
  stars=stars.filter(s=>s.update());stars.forEach(s=>s.draw());
  while(stars.length<STAR_COUNT)stars.push(new Star());

  requestAnimationFrame(render);
}
render();

  if(adminCtrls)adminCtrls.style.display=isAdmin?"inline":"none";
  if(!projects||projects.length===0){
    el.innerHTML=`<div class="project-card" style="opacity:0.35;cursor:default"><div class="icon">✨</div><div class="info"><h3>还没有项目</h3><div class="desc">等 Y老大 添加新项目</div></div><div class="arrow">→</div></div>`;
    return;
  }
  el.innerHTML=projects.map((p,i)=>{
    const tags=p.tags&&Array.isArray(p.tags)?p.tags.map(t=>`<span>${esc(t)}</span>`).join(""):"";
    const statusHtml=p.status==="online"?`<span class="status-badge online">● 已上线</span>`:`<span class="status-badge wip">● 规划中</span>`;
    const adminActions=isAdmin?`<div style="position:absolute;top:8px;right:8px;z-index:2;display:flex;gap:4px">
      <button onclick="event.stopPropagation();deleteProject('${p.id}')" style="background:rgba(248,81,73,0.15);border:none;color:#f85149;padding:2px 8px;border-radius:6px;cursor:pointer;font-size:0.65rem;font-family:inherit">🗑️</button>
    </div>`:"";
    return `<a class="project-card" href="${esc(p.url)}" target="_blank" rel="noopener"
      style="--card-accent:${p.accent||"rgba(255,255,255,0.1)"};--card-icon-bg:${p.iconBg||"rgba(255,255,255,0.03)"}">
      ${adminActions}
      <div class="icon">${p.icon||"📦"}</div>
      <div class="info">
        <h3>${esc(p.name)} ${statusHtml}</h3>
        <div class="desc">${esc(p.desc)}</div>
        <div class="tags">${tags}</div>
      </div>
      <div class="arrow">→</div>
    </a>`;
  }).join("");
}

function showAddProject(){
  const name=prompt("项目名称：");if(!name)return;
  const desc=prompt("项目描述：");if(!desc)return;
  const url=prompt("项目链接：");if(!url)return;
  const icon=prompt("项目图标（Emoji）：")||"📦";
  const tagsStr=prompt("标签（逗号分隔）：")||"";
  const tags=tagsStr.split(",").map(t=>t.trim()).filter(Boolean);
  projects.push({
    id:"p_"+Date.now(),
    icon,name,desc,url,
    tags,
    accent:"#58a6ff",
    iconBg:"linear-gradient(135deg,rgba(88,166,255,0.15),rgba(188,140,255,0.15))",
    status:"online"
  });
  renderProjects();
  saveProjects();
}

function deleteProject(id){
  if(!confirm("删除这个项目？"))return;
  projects=projects.filter(p=>p.id!==id);
  renderProjects();
  saveProjects();
}

// Wrap the admin toggle to also show project controls
const origToggle=toggleAdminMode;
toggleAdminMode=function(){
  origToggle();
  renderProjects();
};

// Load on init
loadMessages();
loadProjects();
</script>
</body>
</html>
